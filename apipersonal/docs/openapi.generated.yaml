          description: OK
        "400":
          description: Parámetros inválidos
        "401":
          description: No autenticado
        "403":
          description: No autorizado
  /api/v1/documents/{id}/file:
    get:
      tags:
        - documents
      security:
        - bearerAuth: []
      summary: Descargar/visualizar documento por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Archivo (stream)
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          description: ID inválido / ruta inválida
        "401":
          description: No autenticado
        "403":
          description: No autorizado
        "404":
          description: No encontrado
        "413":
          description: Archivo demasiado grande
        "415":
          description: Tipo de archivo no permitido
        "423":
          description: Bloqueado (virus detectado)
        "500":
          description: Error
