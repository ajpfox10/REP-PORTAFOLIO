          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "404":
          description: Not found
    put:
      tags:
        - crud
      security:
        - bearerAuth: []
      summary: Update agentes by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Table_agentes"
      responses:
        "200":
          description: OK
        "404":
          description: Not found
    patch:
      tags:
        - crud
      security:
        - bearerAuth: []
      summary: Patch agentes by id
      parameters:
        - name: id
          in: path
