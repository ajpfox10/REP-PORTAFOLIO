openapi: 3.0.3
info:
  title: personalv5-enterprise-api
  version: 1.0.0
tags:
  - name: system
    description: Health/ready/endpoints base
  - name: meta
    description: Endpoints auxiliares del CRUD
  - name: auth
    description: Autenticación (login/refresh/logout)
  - name: personal
    description: Búsqueda de personal (dni / apellido / nombre)
  - name: crud
    description: CRUD genérico por tabla/vista
  - name: docs
    description: OpenAPI spec
  - name: documents
    description: Listado y descarga de documentos (tblarchivos)
  - name: agentes
    description: Gestión de agentes y recursos asociados (datos personales, fotos,
      documentos vinculados)
paths:
  /health:
    get:
      tags:
        - system
      summary: Health check
      responses:
        "200":
          description: OK
  /ready:
    get:
      tags:
        - system
      summary: Readiness check (DB ping)
      x-internal: true
      responses:
        "200":
          description: Ready
        "503":
          description: DB not ready
  /api/v1/tables:
    get:
      tags:
        - meta
      summary: List tables/views available for CRUD
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
  /api/v1/personal/search:
    get:
      tags:
        - personal
      security:
        - bearerAuth: []
      summary: Buscar personal por dni / apellido / nombre
      parameters:
        - name: dni
          in: query
          schema:
            type: string
        - name: apellido
          in: query
          schema:
            type: string
        - name: nombre
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
        "400":
          description: Parámetros inválidos
        "401":
          description: No autenticado
        "403":
          description: No autorizado
  /api/v1/agentes/{dni}/foto:
    get:
      tags:
        - agentes
      security:
        - bearerAuth: []
      summary: Obtener foto credencial por DNI
      parameters:
        - name: dni
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Imagen
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        "400":
          description: DNI inválido
        "401":
          description: No autenticado
        "403":
          description: No autorizado
        "404":
          description: Not found
  /docs/openapi.yaml:
    get:
      tags:
        - docs
      summary: Get OpenAPI spec (yaml)
      responses:
        "200":
          description: OK
  /docs/openapi.json:
    get:
      tags:
        - docs
      summary: Get OpenAPI spec (json)
      responses:
        "200":
          description: OK
  /api/v1/auth/login:
    post:
      tags:
        - auth
      summary: Login de usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: Login OK
        "401":
          description: Credenciales inválidas
  /api/v1/auth/refresh:
    post:
      tags:
        - auth
      summary: Refresh token
      responses:
        "200":
          description: Token renovado
        "401":
          description: No autorizado
  /api/v1/auth/logout:
    post:
      tags:
        - auth
      summary: Logout
      responses:
        "200":
          description: Logout OK
  /api/v1/agentes:
    get:
      tags:
        - crud
      security:
        - bearerAuth: []
      summary: List agentes
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Table_agentes"
    post:
      tags:
        - crud
      security:
        - bearerAuth: []
      summary: Create agentes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Table_agentes_Create"
      responses:
        "201":
          description: Created
  /api/v1/agentes/{id}:
    get:
      tags:
        - crud
      security:
        - bearerAuth: []
      summary: Get agentes by id
      parameters:
