version: "3.9"

services:
  api:
    build:
      context: ../
      dockerfile: docker/Dockerfile.api
    env_file: ../.env
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    volumes:
      - scanner_storage:/app/storage

  worker:
    build:
      context: ../
      dockerfile: docker/Dockerfile.worker
    env_file: ../.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    volumes:
      - scanner_storage:/app/storage

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: scanner_saas
    ports:
      - "3307:3306"       # 3307 para no chocar con el mysql del api_personal (3306)
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - scanner_mysql:/var/lib/mysql
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"       # 6380 para no chocar con redis del api_personal
    volumes:
      - scanner_redis:/data
    restart: unless-stopped

  clamav:
    image: clamav/clamav:stable
    profiles: ["antivirus"]   # opt-in: docker compose --profile antivirus up
    ports:
      - "3310:3310"
    volumes:
      - scanner_clamav:/var/lib/clamav
    restart: unless-stopped

volumes:
  scanner_mysql:
  scanner_redis:
  scanner_storage:
  scanner_clamav:
