version: 1

# deny-by-default philosophy: only explicitly allowed tables are served via /api/v1/db
# Modify this file to expose new tables — changes are picked up on deploy (schema_version bump).

tables:
  # Pacientes: readable by vet and receptionist, no deletion
  pacientes:
    allow: { read: true, create: true, update: true, delete: false }
    deny_columns: []

  # Propietarios: full CRUD for receptionist
  propietarios:
    allow: { read: true, create: true, update: true, delete: false }
    deny_columns: []

  # Veterinarios: readable by all, managed by admin
  veterinarios:
    allow: { read: true, create: false, update: false, delete: false }
    deny_columns: []

  # Sucursales: read-only via CRUD, managed by internal API
  sucursales:
    allow: { read: true, create: false, update: false, delete: false }
    deny_columns: []

  # Turnos: agenda management
  turnos:
    allow: { read: true, create: true, update: true, delete: true }
    deny_columns: []

  # Consultas: full CRUD
  consultas:
    allow: { read: true, create: true, update: true, delete: false }
    deny_columns: []

  # Vacunas: full CRUD
  vacunas:
    allow: { read: true, create: true, update: true, delete: false }
    deny_columns: []

  # Productos: readable, mutations only by admin
  productos:
    allow: { read: true, create: false, update: false, delete: false }
    deny_columns: []

  # Users: never exposed via dynamic CRUD (sensitive)
  users:
    deny: { read: true, create: true, update: true, delete: true }

  # Audit log: never writable via CRUD
  auditoria_log:
    deny: { read: true, create: true, update: true, delete: true }

  # Schema internals: never exposed
  schema_meta:
    deny: { read: true, create: true, update: true, delete: true }
  migrations:
    deny: { read: true, create: true, update: true, delete: true }

default:
  allow: { read: false, create: false, update: false, delete: false }
